    description: "Spolková republika Německo zakotvila zákaz trestu smrti v článku 102 Základního zákona (Grundgesetz) z roku 1949. Šlo o vědomé odmítnutí kontinuity s nacistickým státem, který trest smrti používal hromadně."

  - id: udhr-1948
    year: 1948
