    description: "OSN přijala 10. prosince 1948 Všeobecnou deklaraci lidských práv (UDHR). Článek 3 zaručuje právo na život. Deklarace sama trest smrti nezakazuje, ale stala se zárodkem mezinárodní debaty — a abolicionisté ji od té doby citují jako klíčový argument."

