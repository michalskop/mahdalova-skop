    date: "2015–2016"
    title: "Írán, Saúdská Arábie: historické maximum poprav"
    emoji: "📈"
    summary: "V roce 2015 byly zaznamenány tisíce poprav — nejvíce od roku 1989. Írán a Saúdská Arábie dominují globálním statistikám."
    description: "Rok 2015 zaznamenal globálně nejvyšší počet poprav od roku 1989 — přes 1 600 (bez Číny, která data tají). Írán popravil přes 1 000 lidí, Saúdská Arábie přes 150. Dominovaly drogové trestné činy. Amnesty International toto období označila za 'dramatický globální nárůst'."

