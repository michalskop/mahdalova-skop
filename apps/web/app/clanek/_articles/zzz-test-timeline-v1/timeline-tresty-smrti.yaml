    description: "Prezidentka Gloria Macapagal-Arroyo podepsala 24. června 2006 zákon Republic Act 9346, který znovu zrušil trest smrti. Přes 1 200 vězňů bylo naráz přesunuto z death row — největší hromadné zmírnění rozsudků v dějinách podle Amnesty International."
    persons:
      - name: "Gloria Macapagal-Arroyo"
        bio: "Filipínská prezidentka (2001–2010)"

