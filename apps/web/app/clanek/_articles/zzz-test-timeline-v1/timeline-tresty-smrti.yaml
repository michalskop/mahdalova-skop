    description: "Valné shromáždění OSN přijalo v prosinci 2007 první rezoluci vyzývající ke globálnímu moratoru na výkon trestu smrti. Šlo o nezávazný dokument, ale symbolicky silný signal. Rezoluce se od té doby obnovuje — v roce 2024 ji podpořily poprvé v historii dvě třetiny členských států OSN."

  - id: iran-surge-2010s
