// ── Config ────────────────────────────────────────────────────────────────────
const DOT  = 8;          // dot diameter px (in 30-unit face coords scaled to DOT)
const GAP  = 1.5;        // gap between dots
const STEP = DOT + GAP;
const MARGIN = { top: 24, right: 72, bottom: 68, left: 46 };
const HEIGHT = 360;

// Face path (30×30 viewBox, 3 rounded corners, top-right sharp)
const FACE_D = "M 11.29 0 Q 0 0 0 11.29 L 0 18.71 Q 0 30 11.29 30 L 18.71 30 Q 30 30 30 18.71 L 30 0 L 11.29 0 Z";
const FACE_SCALE = DOT / 30;

// ── Beeswarm placement ────────────────────────────────────────────────────────
function placeBeeswarm(items, getY, size, maxDx) {
  const step = size + GAP;
  const placed = [];
  const result = new Array(items.length);
  const sorted = items.map((item, i) => ({ item, i })).sort((a, b) => a.item.value - b.item.value);

  for (const { item, i } of sorted) {
    const y = getY(item.value);
    const candidates = [0];
    for (let s = 1; s * step <= maxDx + step * 0.5; s++) {
      if (s * step <= maxDx)  candidates.push(s * step);
      if (-s * step >= -maxDx) candidates.push(-s * step);
    }
    let dx = candidates[placed.length % candidates.length] ?? 0;
    for (const c of candidates) {
      const ok = placed.every(p => {
        const dy = p.y - y, ddx = p.dx - c;
        return Math.hypot(ddx, dy) >= step;
      });
      if (ok) { dx = c; break; }
    }
    placed.push({ y, dx });
    result[i] = { item, dx };
  }
  return result;
}

// ── SVG helpers ───────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ── Render ────────────────────────────────────────────────────────────────────
const wrap = document.getElementById('swarm-svg-wrap');
const tt   = document.getElementById('dtp-tt');

let hoveredId = null;

function render() {
  wrap.innerHTML = '';
  const W = wrap.clientWidth || 700;
  const svg = el('svg', { width: W, height: HEIGHT, overflow: 'visible' });
  wrap.appendChild(svg);

  const innerW = W - MARGIN.left - MARGIN.right;
  const innerH = HEIGHT - MARGIN.top - MARGIN.bottom;

  const g = el('g', { transform: `translate(${MARGIN.left},${MARGIN.top})` });
  svg.appendChild(g);

  // Y scale: 0→innerH (bottom), 1→0 (top)
  const yScale = v => innerH * (1 - v);

  // X scale: equal bands
  const nGroups = GROUPS.length;
  const bw = innerW / nGroups;

  // Y-axis ticks
  const yTicks = [0, 0.25, 0.5, 0.75, 1.0];
  for (const t of yTicks) {
    const y = yScale(t);
    // gridline
    g.appendChild(el('line', {
      x1: 0, x2: innerW, y1: y, y2: y,
      stroke: t === 0 ? '#aaa' : '#ddd',
      'stroke-width': t === 0 ? 1 : 1,
      'stroke-dasharray': t === 0 ? '' : '3 3',
      opacity: t === 0 ? 0.6 : 0.5,
    }));
    // label
    const txt = el('text', {
      x: -8, y: y,
      dy: '0.35em',
      'text-anchor': 'end',
      'font-size': 11,
      fill: '#888',
      'font-family': "'Roboto Slab', Georgia, serif",
    });
    txt.textContent = Math.round(t * 100) + ' %';
    g.appendChild(txt);
  }

  // 50% reference line (highlighted)
  const ref50y = yScale(0.5);
  g.appendChild(el('line', {
    x1: 0, x2: innerW, y1: ref50y, y2: ref50y,
    stroke: '#666', 'stroke-width': 1.5, 'stroke-dasharray': '5 3', opacity: 0.7,
  }));
  const refLbl = el('text', {
    x: innerW + 5, y: ref50y,
    dy: '0.35em', 'font-size': 10, fill: '#888',
    'font-family': "'Roboto Slab', Georgia, serif",
  });
  refLbl.textContent = '50 %';
  g.appendChild(refLbl);

  // Column guides + dots
  GROUPS.forEach((group, gi) => {
    const cx = (gi + 0.5) * bw;
    const maxDx = bw / 2 - DOT / 2 - 1;

    // Dashed column guide
    g.appendChild(el('line', {
      x1: cx, x2: cx, y1: 0, y2: innerH,
      stroke: '#ccc', 'stroke-dasharray': '3 3', opacity: 0.4,
    }));

    // Beeswarm
    const placed = placeBeeswarm(group.items, yScale, DOT, Math.max(maxDx, 0));

    const grpG = el('g', { transform: `translate(${cx},0)` });
    g.appendChild(grpG);

    // Average line
    const avgY = yScale(group.avg);
    grpG.appendChild(el('line', {
      x1: -bw * 0.3, x2: bw * 0.3,
      y1: avgY, y2: avgY,
      stroke: group.color,
      'stroke-width': 2,
      opacity: 0.6,
    }));

    // Dots (sorted so highlighted renders on top)
    const sorted = [...placed].sort((a, b) =>
      a.item.id === hoveredId ? 1 : b.item.id === hoveredId ? -1 : 0
    );

    for (const { item, dx } of sorted) {
      const iy = yScale(item.value);
      const isHov = item.id === hoveredId;
      const dimmed = hoveredId !== null && !isHov;

      const dotG = el('g', {
        transform: `translate(${dx - DOT / 2},${iy - DOT / 2})`,
        style: 'cursor:pointer',
      });

      dotG.appendChild(el('path', {
        d: FACE_D,
        transform: `scale(${FACE_SCALE})`,
        fill: group.color,
        stroke: group.color,
        'fill-opacity': dimmed ? 0.1 : isHov ? 0.9 : 0.4,
        'stroke-opacity': dimmed ? 0.15 : isHov ? 1 : 0.65,
        'stroke-width': (isHov ? 2 : 1) / FACE_SCALE,
      }));

      dotG.addEventListener('mouseenter', e => {
        hoveredId = item.id;
        render();
        showTooltip(item, group, e);
      });
      dotG.addEventListener('mousemove', positionTooltip);
      dotG.addEventListener('mouseleave', () => {
        hoveredId = null;
        render();
        hideTooltip();
      });

      grpG.appendChild(dotG);
    }

    // X-axis party face icon (32px)
    const ICON = 32;
    const IS = ICON / 30;
    const faceG = el('g', {
      transform: `translate(${cx - ICON / 2},${innerH + 8})`,
    });
    const darkText = group.id === 'KDU-ČSL';
    faceG.appendChild(el('path', {
      d: FACE_D,
      transform: `scale(${IS})`,
      fill: group.color,
    }));
    const abbr = el('text', {
      x: ICON / 2,
      y: ICON * 0.62,
      'text-anchor': 'middle',
      'font-size': 8.5,
      'font-weight': 700,
      'font-family': "'Roboto Slab', Georgia, serif",
      fill: darkText ? '#1a1a1a' : '#ffffff',
    });
    abbr.textContent = group.label;
    faceG.appendChild(abbr);

    // Count label below face
    const cntLbl = el('text', {
      x: cx,
      y: innerH + 8 + ICON + 11,
      'text-anchor': 'middle',
      'font-size': 10,
      fill: '#888',
      'font-family': "'Roboto Slab', Georgia, serif",
    });
    cntLbl.textContent = 'n=' + group.count;
    g.appendChild(cntLbl);

    g.appendChild(faceG);
  });
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
let _mouseX = 0, _mouseY = 0;

function positionTooltip(e) {
  if (e) { _mouseX = e.clientX; _mouseY = e.clientY; }
  const margin = 10;
  const ttW = tt.offsetWidth  || 190;
  const ttH = tt.offsetHeight || 100;
  const vw  = window.innerWidth;
  const vh  = window.innerHeight;
  let x = _mouseX + 14;
  let y = _mouseY - ttH / 2;
  x = Math.max(margin, Math.min(x, vw - ttW - margin));
  y = Math.max(margin, Math.min(y, vh - ttH - margin));
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

function showTooltip(item, group, e) {
  const pct = Math.round(item.value * 100);
  tt.innerHTML = `
    <div class="dtp-tt-name">${item.label}</div>
    <div class="dtp-tt-club">${group.id}</div>
    <div class="dtp-tt-rate">${pct} % účast</div>
    <div class="dtp-tt-counts">přítomen: ${item.present}×, omluven: ${item.absent}×</div>
  `;
  tt.classList.add('dtp-visible');
  positionTooltip(e);
}

function hideTooltip() {
  tt.classList.remove('dtp-visible');
}

// ── Init + resize ─────────────────────────────────────────────────────────────
render();

let raf = null;
window.addEventListener('resize', () => {
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(render);
});

})();
</script>
