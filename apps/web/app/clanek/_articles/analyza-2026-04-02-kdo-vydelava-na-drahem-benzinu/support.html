<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podpořte DataTimes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;700;900&family=Roboto:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 0; background: transparent; }
  *, *::before, *::after { box-sizing: border-box; }

  .dt-wrap { width: 100%; }

  .dt-link {
    display: block;
    text-decoration: none;
    background: #101432;
    padding: 22px 30px 26px;
    transition: filter .18s;
  }
  .dt-link:hover { filter: brightness(1.12); }

  /* Řádek 1: logo + DataTimes VPRAVO */
  .dt-header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 8px;
  }
  .dt-logo svg { display: block; width: clamp(34px,4.2vw,48px); height: clamp(34px,4.2vw,48px); flex-shrink:0; }
  .dt-name {
    font-family: 'Roboto Slab', 'Arial Black', Impact, sans-serif;
    font-size: clamp(20px, 4.8vw, 48px);
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .dt-red    { color: #de1743; }
  .dt-yellow { color: #ffcf02; }

  /* Tělo VLEVO */
  .dt-body {
    font-family: 'Roboto', Arial, sans-serif;
    font-size: clamp(12px, 1.8vw, 16px);
    color: #fdfbf7;
    line-height: 1.55;
    text-align: left;
    margin: 0 0 18px;
  }

  /* Tlačítko UPROSTŘED — velké zaoblené pill */
  .dt-btn-wrap { text-align: center; }
  .dt-btn {
    display: inline-block;
    font-family: 'Roboto Slab', 'Arial Black', sans-serif;
    font-size: clamp(13px, 2vw, 18px);
    font-weight: 400;
    color: #fff;
    background: #de1743;
    padding: 13px 52px;
    border-radius: 50px;
    letter-spacing: .01em;
    box-shadow: 0 3px 18px rgba(222,23,67,.4);
    transition: background .15s, box-shadow .15s, transform .12s;
  }
  .dt-link:hover .dt-btn {
    background: #c01238;
    box-shadow: 0 5px 24px rgba(222,23,67,.6);
    transform: translateY(-1px);
  }

  .dt-bar { height: 4px; background: linear-gradient(to right, #de1743, #f76800, #ffcf02); }

  @media(max-width:520px){
    .dt-link{padding:16px 16px 20px;}
    .dt-name{font-size:22px;}
    .dt-body{font-size:13px;}
    .dt-btn{font-size:14px;padding:11px 32px;}
    .dt-logo svg{width:30px;height:30px;}
  }
</style>
</head>
<body>
<div class="dt-wrap">
  <a href="https://buy.stripe.com/cNicN6damdlO7rY1x93ks0a" target="_blank" rel="noopener noreferrer" class="dt-link">
    <div class="dt-header">
      <div class="dt-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="112 112 276 276" aria-hidden="true">
          <defs><linearGradient id="dtG2" x1="1" x2=".25" y1=".5" y2="1">
            <stop offset="0%" stop-color="#ffcf02" stop-opacity="0"/>
            <stop offset="50%" stop-color="#ffcf02" stop-opacity="0"/>
            <stop offset="50%" stop-color="#ffcf02" stop-opacity="1"/>
            <stop offset="100%" stop-color="#ffcf02" stop-opacity="1"/>
          </linearGradient></defs>
          <g transform="rotate(-30 250 250)">
            <path fill="none" stroke="#ffcf02" stroke-width="76" stroke-linecap="round" d="M250 350 A100 100 0 0 0 336.60254 300"/>
            <path fill="none" stroke="#f76800" stroke-width="76" stroke-linecap="round" d="M336.60254 300 A100 100 0 0 0 250 150"/>
            <path fill="none" stroke="#de1743" stroke-width="76" stroke-linecap="round" d="M250 150 A100 100 0 0 0 250 350"/>
            <path fill="none" stroke="url(#dtG2)" stroke-width="76" stroke-linecap="round" d="M250 350 A100 100 0 0 0 336.60254 300"/>
          </g>
        </svg>
      </div>
      <p class="dt-name">
        <span class="dt-red">Data</span><span class="dt-yellow">Times</span>
      </p>
    </div>
    <p class="dt-body">
      Veřejný prostor i politiku zaplavují blbosti, fake news a propaganda. Pomáhejte s námi šířit ověřená fakta, data a analýzy.<br>
      Za cenu jednoho oběda.
    </p>
    <div class="dt-btn-wrap">
      <span class="dt-btn">Jdu do toho.</span>
    </div>
  </a>
  <div class="dt-bar"></div>
</div>
