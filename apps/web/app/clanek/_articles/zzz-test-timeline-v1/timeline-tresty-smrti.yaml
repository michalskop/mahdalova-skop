    emoji: "🕊️"
    summary: "Americký stát Michigan jako první v anglosaském světě zrušil trest smrti — s výjimkou velezrady."
    description: "Michigan zrušil trest smrti jako první stát v anglosaském právním světě. Impulsem byl hrůzný omyl — chybná poprava nevinného člověka, která šokovala veřejnost. Wisconsin následoval v roce 1853."

  - id: beccaria
    year: 1764
    month: 1
    facets:
      topic: milestone
      geo: europe
    date: "1764"
    title: "Beccaria: O zločinech a trestech"
    emoji: "📖"
    summary: "Italský osvícenec Cesare Beccaria vydává esej zpochybňující morální oprávnění státu brát životy."
    description: "Cesare Beccaria ve svém díle Dei delitti e delle pene (O zločinech a trestech) formuluje osvícenecký argument: trest musí být přiměřený, předvídatelný a odstrašující — ale smrt jako trest tyto podmínky nesplňuje. Text ovlivnil legislativu po celé Evropě i v zárodcích americké demokracie."
    persons:
      - name: "Cesare Beccaria"
        bio: "Italský právní filosof a osvícenec (1738–1794)"

  - id: usa-furman-1972
    year: 1972
    month: 6
    facets:
      topic: moratorium
      geo: americas
    date: "Červen 1972"
    title: "USA: Furman v. Georgia — de facto moratorium"
    emoji: "⚖️"
    summary: "Nejvyšší soud USA rozhodl, že svévolné udělování trestu smrti porušuje ústavu. Popravy se na čtyři roky zastavily."
    description: "Rozhodnutím Furman v. Georgia Nejvyšší soud USA pozastavil výkon trestu smrti pro jeho svévolnou a diskriminační aplikaci. Více než 600 odsouzených bylo z death row přesunuto. Šlo o de facto moratorium — ne o ústavní zákaz."

  - id: usa-gregg-1976
    year: 1976
