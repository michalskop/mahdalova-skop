<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&amp;display=swap');

      .bg { fill: #F7F6F2; }
      .text-main { font-family: 'Roboto Condensed', sans-serif; font-size: 13px; fill: #333333; }
      .text-title { font-family: 'Roboto Condensed', sans-serif; font-size: 15px; font-weight: 700; fill: #222222; }
      .text-age { font-family: 'Roboto Condensed', sans-serif; font-size: 12px; fill: #666666; }
      .text-red { font-family: 'Roboto Condensed', sans-serif; font-size: 14px; font-weight: 700; fill: #D81B60; letter-spacing: 0.5px; }

      .timeline { stroke: #D0D0D0; stroke-width: 2; }
      .tick { stroke: #C0C0C0; stroke-width: 1; stroke-dasharray: 2 3; }

      .line-past { stroke: #4D2C62; stroke-width: 2; }
      .line-present { stroke: #D81B60; stroke-width: 2; }

      .dot-past { fill: #4D2C62; stroke: #F7F6F2; stroke-width: 2; }
      .dot-present { fill: #D81B60; stroke: #F7F6F2; stroke-width: 2; }

      .gap-box { fill: #D81B60; fill-opacity: 0.08; }
    </style>
  </defs>

  <rect width="600" height="160" class="bg" />

  <rect x="140" y="30" width="240" height="100" class="gap-box" />
  <text x="260" y="85" class="text-red" text-anchor="middle">TEMPO EFEKT</text>

  <text x="65" y="55" class="text-title" text-anchor="end">Rok 1995</text>
  <text x="65" y="115" class="text-title" text-anchor="end">Dnes</text>

  <line x1="80" y1="50" x2="560" y2="50" class="line-past" opacity="0.3" />
  <line x1="80" y1="110" x2="560" y2="110" class="line-present" opacity="0.3" />

  <line x1="80" y1="20" x2="80" y2="135" class="tick" />
  <text x="80" y="150" class="text-age" text-anchor="middle">Věk 20</text>

  <line x1="230" y1="20" x2="230" y2="135" class="tick" />
  <text x="230" y="150" class="text-age" text-anchor="middle">Věk 25</text>

  <line x1="380" y1="20" x2="380" y2="135" class="tick" />
  <text x="380" y="150" class="text-age" text-anchor="middle">Věk 30</text>

  <line x1="530" y1="20" x2="530" y2="135" class="tick" />
  <text x="530" y="150" class="text-age" text-anchor="middle">Věk 35</text>

  <circle cx="140" cy="50" r="6" class="dot-past" />
  <text x="140" y="35" class="text-main" text-anchor="middle" font-weight="700">1. dítě</text>

  <circle cx="230" cy="50" r="6" class="dot-past" />
  <text x="230" y="35" class="text-main" text-anchor="middle" font-weight="700">2. dítě</text>

  <circle cx="380" cy="110" r="6" class="dot-present" />
  <text x="380" y="130" class="text-main" text-anchor="middle" font-weight="700">1. dítě</text>

  <circle cx="470" cy="110" r="6" class="dot-present" />
  <text x="470" y="130" class="text-main" text-anchor="middle" font-weight="700">2. dítě</text>

</svg>
