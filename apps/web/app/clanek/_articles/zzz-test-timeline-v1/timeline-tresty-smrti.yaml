    title: "USA: Gregg v. Georgia — návrat poprav"
    emoji: "⚠️"
    summary: "Nejvyšší soud schvaluje nové zákony o trestu smrti jako ústavní. Popravy se obnovují."
    description: "Ve věci Gregg v. Georgia Nejvyšší soud USA rozhodl, že reformované státní zákony o trestu smrti jsou ústavní. Trest smrti se vrátil a 37 států ho postupně znovu zavedlo. V roce 1977 proběhla první poprava po čtyřleté pauze."

