    emoji: "⏸️"
    summary: "Rusko vyhlásilo moratorium na popravy jako podmínku přijetí do Rady Evropy."
    description: "Rusko vyhlásilo moratorium na výkon trestu smrti v roce 1996 jako podmínku vstupu do Rady Evropy. Trest smrti zůstal v zákonech zachován, ale od té doby nebyla provedena žádná poprava. Poslední poprava na ruském území se odehrála v roce 1999 v Čečensku — v době, kdy tato oblast fakticky nebyla pod ruskou kontrolou."

