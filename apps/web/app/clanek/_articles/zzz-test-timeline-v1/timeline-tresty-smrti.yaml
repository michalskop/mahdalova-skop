    emoji: "⚠️"
    summary: "Za Duterteho 'války s drogami' sněmovna schválila zákon obnovující trest smrti — Senát ho však zablokoval."
    description: "Filipínská sněmovna hlasovala v březnu 2017 pro zákon obnovující trest smrti za drogové trestné činy, a to navzdory mezinárodněprávním závazkům země (Filipíny ratifikovaly druhý opční protokol ICCPR zakazující trest smrti). Senát zákon zablokoval. Pokusy o obnovení se opakovaly i v letech 2019 a 2021."
    persons:
      - name: "Rodrigo Duterte"
        bio: "Filipínský prezident (2016–2022), prosazoval 'válku s drogami'"

  - id: zimbabwe-2024
