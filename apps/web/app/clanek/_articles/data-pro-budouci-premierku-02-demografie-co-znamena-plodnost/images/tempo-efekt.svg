<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
  <style>
    .timeline { stroke: #94A3B8; stroke-width: 3; }
    .tick { stroke: #CBD5E1; stroke-width: 1; stroke-dasharray: 4 4; }
    .dot-past { fill: #9B59B6; stroke: #fff; stroke-width: 3; } /* Amethyst */
    .dot-present { fill: #DC143C; stroke: #fff; stroke-width: 3; } /* Crimson Red */
    .text-main { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #334155; }
    .text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 700; fill: #0F172A; }
    .text-age { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748B; font-weight: 600; }
    .text-red { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 800; fill: #DC143C; letter-spacing: 1px; }
    .gap-box { fill: #DC143C; fill-opacity: 0.06; }
  </style>

  <!-- GAP HIGHLIGHT (Čistý stínovaný blok přes chybějící roky) -->
  <rect x="160" y="50" width="240" height="200" class="gap-box" rx="6" />
  
  <text x="280" y="140" class="text-red" text-anchor="middle">TEMPO EFEKT</text>
  <text x="280" y="160" class="text-main" text-anchor="middle" font-size="12px">Období chybějících dětí</text>

  <!-- Y-Axis Labels -->
  <text x="80" y="85" class="text-title" text-anchor="end">Rok 1995</text>
  <text x="80" y="215" class="text-title" text-anchor="end">Dnes</text>

  <!-- Timelines -->
  <line x1="100" y1="80" x2="600" y2="80" class="timeline" />
  <line x1="100" y1="210" x2="600" y2="210" class="timeline" />

  <!-- Age Ticks and Labels (Bottom) -->
  <line x1="100" y1="40" x2="100" y2="250" class="tick" />
  <text x="100" y="270" class="text-age" text-anchor="middle">Věk 20</text>
  
  <line x1="250" y1="40" x2="250" y2="250" class="tick" />
  <text x="250" y="270" class="text-age" text-anchor="middle">Věk 25</text>
  
  <line x1="400" y1="40" x2="400" y2="250" class="tick" />
  <text x="400" y="270" class="text-age" text-anchor="middle">Věk 30</text>
  
  <line x1="550" y1="40" x2="550" y2="250" class="tick" />
  <text x="550" y="270" class="text-age" text-anchor="middle">Věk 35</text>

  <!-- DATA POINTS 1995 (Amethyst) -->
  <!-- 1st Child: 22 years (x=160) -->
  <circle cx="160" cy="80" r="8" class="dot-past" />
  <text x="160" y="55" class="text-main" text-anchor="middle" font-weight="bold">1. dítě</text>
  <text x="160" y="38" class="text-age" text-anchor="middle">(22 let)</text>

  <!-- 2nd Child: 25 years (x=250) -->
  <circle cx="250" cy="80" r="8" class="dot-past" />
  <text x="250" y="55" class="text-main" text-anchor="middle" font-weight="bold">2. dítě</text>
  <text x="250" y="38" class="text-age" text-anchor="middle">(25 let)</text>

  <!-- DATA POINTS TODAY (Crimson Red) -->
  <!-- 1st Child: 30 years (x=400) -->
  <circle cx="400" cy="210" r="8" class="dot-present" />
  <text x="400" y="240" class="text-main" text-anchor="middle" font-weight="bold">1. dítě</text>
  <text x="400" y="255" class="text-age" text-anchor="middle">(30 let)</text>

  <!-- 2nd Child: 33 years (x=490) -->
  <circle cx="490" cy="210" r="8" class="dot-present" />
  <text x="490" y="240" class="text-main" text-anchor="middle" font-weight="bold">2. dítě</text>
  <text x="490" y="255" class="text-age" text-anchor="middle">(33 let)</text>
</svg>
