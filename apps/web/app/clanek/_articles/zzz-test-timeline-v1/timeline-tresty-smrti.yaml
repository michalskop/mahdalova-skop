    title: "Zimbabwe — nejmladší abolicionistická země"
    emoji: "🕊️"
    summary: "Zimbabwe podepsalo zákon rušící trest smrti pro běžné trestné činy — téměř 20 let po poslední popravě."
    description: "Zimbabwe podepsalo 31. prosince 2024 zákon rušící trest smrti pro běžné trestné činy. Poslední poprava se v zemi odehrála přibližně před dvaceti lety. Jde o dosud nejnovější zemi, která přistoupila k abolici."

  - id: global-executions-2024
    year: 2024
    month: 4
    facets:
      topic: surge
      geo: global
    date: "2024"
    title: "1 518 poprav — nejvíce od roku 2015"
    emoji: "📈"
    summary: "Amnesty International zaznamenala v roce 2024 celosvětově 1 518 poprav v 15 zemích — nárůst o 32 % oproti roku 2023."
    description: "Zpráva Amnesty International z dubna 2025 dokumentuje 1 518 zaznamenaných poprav v roce 2024 — nejvíce od roku 2015. Íán (972+), Saúdská Arábie (345+), Irák (63+), Jemen (38+) — tyto čtyři země jsou zodpovědné za 91 % poprav. Data nezahrnují Čínu, která informace o popravách tají jako státní tajemství."

  - id: israel-2026
    year: 2026
    month: 3
    facets:
      topic: reinstatement
      geo: mideast
    date: "30. března 2026"
    title: "Izrael: zákon o trestu oběšení pro Palestince"
    emoji: "⚠️"
    summary: "Kneset schválil zákon zavádějící trest oběšení jako výchozí trest pro Palestince ze Západního břehu odsouzené vojenskými soudy za teroristický útok s následkem smrti."
    description: "Izraelský parlament hlasoval 30. března 2026 pro zákon (62:48), který zavádí trest oběšení jako výchozí trest pro Palestince ze Západního břehu odsouzené vojenskými soudy za teroristický útok s následkem smrti. Zákon se nevztahuje na izraelské Židy. Naposledy Izrael provedl popravu v roce 1962. Zákon okamžitě napadla u nejvyššího soudu Asociace pro občanská práva v Izraeli."
    persons:
      - name: "Itamar Ben-Gvir"
        bio: "Ministr národní bezpečnosti Izraele, člen strany Otzma Jehudit"
    link: "https://datatimes.cz"
    linkText: "Náš článek o izraelském zákoně"
