    description: "Filipínský president Fidel Ramos podepsal zákon Republic Act 7659, který znovu zavedl trest smrti pro 13 kategorií trestných činů jako 'crime control measure'. Šlo o první případ v moderní historii, kdy demokratický stát zrušení trestu smrti otočil."
