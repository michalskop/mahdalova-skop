    description: "Francie zrušila trest smrti 9. října 1981. Ministr spravedlnosti Robert Badinter pronesl ve sněmovně historický projev. Poslední popravený byl Hamida Djandoubi gilotinou v roce 1977 — šlo o poslední použití gilotiny v západní Evropě."
    persons:
